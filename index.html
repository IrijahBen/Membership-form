<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ye Are The Light Evangelical Church | Registration</title>
    <link rel="stylesheet" type="text/css" href="./style.css" />
    <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
    <style>
      /* CSS Patch for long forms and select dropdowns */
      form {
        max-height: 75vh;
        overflow-y: auto;
        scrollbar-width: thin; /* Firefox */
      }
      form::-webkit-scrollbar {
        width: 5px;
      }
      form::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 5px;
      }
      .input-field select, .input-field textarea {
        background: none;
        outline: none;
        border: none;
        line-height: 1;
        font-weight: 600;
        font-size: 1.1rem;
        color: #333;
        width: 100%;
        font-family: "Poppins", sans-serif;
      }
      .input-field textarea {
        padding-top: 15px;
        resize: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="forms-container">
        <div class="signin-signup">
          
          <form id="first-timer-form" class="sign-in-form">
            <div class="input-field" style="margin-top: 20px;"><i class="fas fa-user"></i><input type="text" name="name" placeholder="Full Name" required /></div>
            <div class="input-field"><i class="fas fa-map-marker-alt"></i><input type="text" name="address" placeholder="Address" required /></div>
            <div class="input-field"><i class="fas fa-envelope"></i><input type="email" name="email" placeholder="Email Address" required /></div>
            <div class="input-field"><i class="fas fa-phone"></i><input type="tel" name="phone" placeholder="Phone Number" required /></div>
            
            <div class="input-field">
              <i class="fas fa-venus-mars"></i>
              <select name="gender" required>
                <option value="" disabled selected>Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
            
            <div class="input-field">
              <i class="fas fa-info-circle"></i>
              <select name="learnAbout" required>
                <option value="" disabled selected>How did you learn about us?</option>
                <option value="Social Media">Social Media</option>
                <option value="Friend/Family">Friend/Family</option>
                <option value="Flyer/Banner">Flyer/Banner</option>
                <option value="Evangelism">Evangelism</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="input-field">
              <i class="fas fa-heart"></i>
              <select name="worshipAgain" required>
                <option value="" disabled selected>Would you love to worship again?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="Maybe">Maybe</option>
              </select>
            </div>

            <div class="input-field" style="height: 80px; border-radius: 20px;">
              <i class="fas fa-comment"></i>
              <textarea name="comments" placeholder="Other Comments..."></textarea>
            </div>

            <input type="submit" value="Submit Form" class="btn solid" />
          </form>

          <form id="membership-form" class="sign-up-form">
            <div class="input-field" style="margin-top: 20px;"><i class="fas fa-user"></i><input type="text" name="name" placeholder="Full Name" required /></div>
            <div class="input-field"><i class="fas fa-map-marker-alt"></i><input type="text" name="address" placeholder="Address" required /></div>
            <div class="input-field"><i class="fas fa-envelope"></i><input type="email" name="email" placeholder="Email Address" required /></div>
            <div class="input-field"><i class="fas fa-phone"></i><input type="tel" name="phone" placeholder="Phone Number" required /></div>
            
            <div class="input-field">
              <i class="fas fa-venus-mars"></i>
              <select name="gender" required>
                <option value="" disabled selected>Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>

            <div class="input-field"><i class="fas fa-birthday-cake"></i><input type="text" name="birthday" placeholder="Birthday (Month & Day)" required /></div>
            
            <div class="input-field">
              <i class="fas fa-user-friends"></i>
              <select name="relationship" required>
                <option value="" disabled selected>Relationship Status</option>
                <option value="Single">Single</option>
                <option value="Married">Married</option>
              </select>
            </div>

            <div class="input-field"><i class="fas fa-ring"></i><input type="text" name="anniversary" placeholder="Marriage Anniversary (If any)" /></div>

            <div class="input-field">
              <i class="fas fa-users-cog"></i>
              <select name="workforce" required>
                <option value="" disabled selected>Workforce Department</option>
                <option value="Choir">Choir</option>
                <option value="Ushers">Ushers</option>
                <option value="Ambience/Sanitation">Ambience/Sanitation</option>
                <option value="Media">Media</option>
                <option value="Prayer">Prayer</option>
                <option value="Moderator">Moderator</option>
                <option value="Facility Management">Facility Management</option>
                <option value="Welfare">Welfare</option>
                <option value="Follow-up">Follow-up</option>
              </select>
            </div>

            <input type="submit" value="Submit Form" class="btn solid" />
          </form>

        </div>
      </div>
      
      <div class="panels-container">
        
        <div class="panel left-panel">
          <div class="content">
            <h2 style="font-size: 1.5rem; line-height: 1.2; margin-bottom: 5px;">Ye Are The Light Evangelical Church</h2>
            <h3>Membership Form</h3>
            <p>Already part of the family? Update your details or join a workforce department to serve!</p>
            <button class="btn transparent" id="sign-up-btn">Switch Form</button>
          </div>
          <img src="./img/log.svg" class="image" alt="">
        </div>

        <div class="panel right-panel">
          <div class="content">
            <h2 style="font-size: 1.5rem; line-height: 1.2; margin-bottom: 5px;">Ye Are The Light Evangelical Church</h2>
            <h3>First Timer Form</h3>
            <p>Worshipping for the first time? We are so glad to have you! Please fill in your details.</p>
            <button class="btn transparent" id="sign-in-btn">Switch Form</button>
          </div>
          <img src="./img/register.svg" class="image" alt="">
        </div>
        
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
